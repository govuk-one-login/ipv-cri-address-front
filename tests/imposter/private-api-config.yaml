plugin: openapi
specFile: ./private-api.yaml

validation:
  request: true

resources:
  # Session endpoints - map client_id to session scenarios
  - method: POST
    path: /session
    requestBody:
      anyOf:
        - jsonPath: $.client_id
          value: "address-success"
        - jsonPath: $.client_id
          value: "address-authorization-error"
        - jsonPath: $.client_id
          value: "international-address"
        - jsonPath: $.client_id
          value: "address-prepopulated"
        - jsonPath: $.client_id
          value: "address-prepopulated-postcode"
    capture:
      cid:
        jsonPath: $.client_id
        store: testStore
    response:
      statusCode: 201
      template: true
      content: '{"session_id": "${stores.testStore.cid}", "state": "sT@t3", "redirect_uri": "http://localhost:8080/return"}'

  # Session error scenario
  - method: POST
    path: /session
    requestBody:
      jsonPath: $.client_id
      value: "session-error"
    response:
      statusCode: 500
      content: "{}"

  # Default session response
  - method: POST
    path: /session
    response:
      statusCode: 400
      content: "{}"

  # Postcode lookup - E1 8QS (success scenarios)
  - method: POST
    path: /postcode-lookup
    requestHeaders:
      session_id: "address-success"
    requestBody:
      jsonPath: $.postcode
      value: "E1 8QS"
    response:
      statusCode: 200
      content: |
        [
          {
            "buildingNumber": "1",
            "addressLocality": "LONDON",
            "postalCode": "E1 8QS",
            "streetName": "WHITECHAPEL HIGH STREET",
            "uprn": "123"
          },
          {
            "buildingNumber": "10",
            "addressLocality": "LONDON",
            "postalCode": "E1 8QS",
            "streetName": "WHITECHAPEL HIGH STREET",
            "uprn": "124"
