openapi: "3.0.1"
info:
  version: "0.2"
  title: "Address Credential Issuer Private API"

paths:
  /session:
    post:
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Authorization"
        required: true
      responses:
        "201":
          description: "201 response"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Session"
        "400":
          description: "400 response"
        "500":
          description: "500 response"

  /postcode-lookup:
    post:
      parameters:
        - name: "session_id"
          in: header
          required: false
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Postcode"
        required: true
      responses:
        "200":
          description: "200 response"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PostcodeLookupResponse"
        "404":
          description: "404 response"

  /address:
    put:
      parameters:
        - name: "session_id"
          in: header
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Address"
        required: true
      responses:
        "200":
          description: "Address saved successfully"
        "201":
          description: "Address saved and credential issued"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthorizationResponse"

  /authorization:
    get:
      parameters:
        - name: session-id
          in: header
          required: true
          schema:
            type: string
      responses:
        "200":
          description: "200 response"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthorizationResponse"
        "500":
          description: "500 response"

  /addresses/v2:
    get:
      parameters:
        - name: "session_id"
          in: header
          required: true
          schema:
            type: string
      responses:
        "200":
          description: "200 response"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AddressesLookupResponse"

  /return:
    get:
      responses:
        "200":
          description: "200 response"

components:
  schemas:
    Authorization:
      required:
        - "client_id"
        - "request"
      type: "object"
      properties:
        client_id:
          type: "string"
          minLength: 1
        request:
          type: "string"
    
    Session:
      type: "object"
      properties:
        session_id:
          type: "string"
        state:
          type: "string"
        redirect_uri:
          type: "string"
          format: "uri"
    
    Postcode:
      type: "object"
      properties:
        postcode:
          type: "string"
    
    PostcodeLookupResponse:
      type: "array"
      items:
        type: "object"
        properties:
          uprn:
            type: "string"
          buildingNumber:
            type: "string"
          buildingName:
            type: "string"
          subBuildingName:
            type: "string"
          streetName:
            type: "string"
          addressLocality:
            type: "string"
          postalCode:
            type: "string"
    
    Address:
      type: "object"
      properties:
        uprn:
          type: "string"
        buildingNumber:
          type: "string"
        buildingName:
          type: "string"
        streetName:
          type: "string"
        addressLocality:
          type: "string"
        postalCode:
          type: "string"
    
    AuthorizationResponse:
      type: "object"
      properties:
        authorizationCode:
          type: "object"
          properties:
            value:
              type: "string"
        redirect_uri:
          type: "string"
          format: "uri"
        oauth_error:
          type: "object"
          properties:
            error:
              type: "string"
            error_description:
              type: "string"
    
    AddressesLookupResponse:
      type: "object"
      properties:
        addresses:
          type: "array"
          items:
            $ref: "#/components/schemas/Address"